version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: xiaobaitu
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - rebuild_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d xiaobaitu"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/xiaobaitu
      REDIS_URL: redis://redis:6379/0
      JOB_STORE_BACKEND: database
      ASYNC_JOB_BACKEND: celery
      AUTO_BOOTSTRAP_DB: "true"
      API_APP_NAME: XiaoBaiTu API
      API_APP_VERSION: 1.0.0
      TEAM_ADMIN_EMAILS: admin@example.com
      TEAM_ALLOWED_EMAIL_DOMAINS: example.com
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/xiaobaitu
      REDIS_URL: redis://redis:6379/0
      JOB_STORE_BACKEND: database
      ASYNC_JOB_BACKEND: celery
      AUTO_BOOTSTRAP_DB: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://api:8000
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: change-me-in-production
      CASDOOR_ISSUER: https://casdoor.example.com
      CASDOOR_CLIENT_ID: change-me
      CASDOOR_CLIENT_SECRET: change-me
      TEAM_ADMIN_EMAILS: admin@example.com
      TEAM_ALLOWED_EMAIL_DOMAINS: example.com
    depends_on:
      - api
    ports:
      - "3000:3000"

volumes:
  rebuild_postgres_data:
