services:
  temu-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: temu-image-gen
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8501}:8501"
    volumes:
      - ./data:/app/data
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - DATABASE_URL=${DATABASE_URL:-postgresql+psycopg://temu:temu@postgres:5432/temu}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - PLATFORM_AUTO_MIGRATE=${PLATFORM_AUTO_MIGRATE:-true}
      - PLATFORM_SEED_DEFAULTS=${PLATFORM_SEED_DEFAULTS:-true}
      - PLATFORM_DEFAULT_ORG_NAME=${PLATFORM_DEFAULT_ORG_NAME:-TEMU Team Workspace}
      - PLATFORM_DEFAULT_PROJECT_NAME=${PLATFORM_DEFAULT_PROJECT_NAME:-Default Project}
      - PLATFORM_ENCRYPTION_KEY=${PLATFORM_ENCRYPTION_KEY:-}
      - TITLE_TEXT_MODEL=${TITLE_TEXT_MODEL:-gemini-3.1-pro}
      - GOOGLE_GENAI_USE_VERTEXAI=${GOOGLE_GENAI_USE_VERTEXAI:-false}
      - FILE_STORAGE_TYPE=${FILE_STORAGE_TYPE:-local}
      - FILE_RETENTION_DAYS=${FILE_RETENTION_DAYS:-7}
      - FILE_STORAGE_PATH=${FILE_STORAGE_PATH:-/app/data/files}
      - S3_ENDPOINT=${S3_ENDPOINT:-}
      - S3_BUCKET=${S3_BUCKET:-}
      - S3_REGION=${S3_REGION:-}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-}
      - S3_PREFIX=${S3_PREFIX:-temu-files/}
      - S3_PRESIGN_EXPIRES=${S3_PRESIGN_EXPIRES:-86400}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - temu-network

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-temu}
      - POSTGRES_USER=${POSTGRES_USER:-temu}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-temu}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-temu} -d ${POSTGRES_DB:-temu}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - temu-network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - temu-network

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    networks:
      - temu-network

  # 可选：Nginx反向代理（取消注释以启用）
  # nginx:
  #   image: nginx:alpine
  #   container_name: temu-nginx
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./nginx/ssl:/etc/nginx/ssl:ro
  #   depends_on:
  #     - temu-app
  #   networks:
  #     - temu-network

networks:
  temu-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  minio-data:
