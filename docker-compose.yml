services:
  workbench:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ecommerce-workbench
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8501}:8501"
    volumes:
      - ./data:/app/data
    environment:
      APP_RUNTIME: ${APP_RUNTIME:-server}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      ECOMMERCE_WORKBENCH_DATA_DIR: ${ECOMMERCE_WORKBENCH_DATA_DIR:-/app/data}
      ECOMMERCE_WORKBENCH_PROJECTS_DIR: ${ECOMMERCE_WORKBENCH_PROJECTS_DIR:-/app/data/projects}
      FILE_STORAGE_TYPE: ${FILE_STORAGE_TYPE:-local}
      FILE_RETENTION_DAYS: ${FILE_RETENTION_DAYS:-7}
      FILE_STORAGE_PATH: ${FILE_STORAGE_PATH:-/app/data/files}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_REGION: ${S3_REGION:-}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-}
      S3_PREFIX: ${S3_PREFIX:-temu-files/}
      S3_PRESIGN_EXPIRES: ${S3_PRESIGN_EXPIRES:-86400}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

