services:
  temu-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: temu-image-gen
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8501}:8501"
    volumes:
      - ./data:/app/data
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GOOGLE_GENAI_USE_VERTEXAI=${GOOGLE_GENAI_USE_VERTEXAI:-false}
      - FILE_STORAGE_TYPE=${FILE_STORAGE_TYPE:-local}
      - FILE_RETENTION_DAYS=${FILE_RETENTION_DAYS:-7}
      - FILE_STORAGE_PATH=${FILE_STORAGE_PATH:-/app/data/files}
      - S3_ENDPOINT=${S3_ENDPOINT:-}
      - S3_BUCKET=${S3_BUCKET:-}
      - S3_REGION=${S3_REGION:-}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-}
      - S3_PREFIX=${S3_PREFIX:-temu-files/}
      - S3_PRESIGN_EXPIRES=${S3_PRESIGN_EXPIRES:-86400}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - temu-network

  # 可选：Nginx反向代理（取消注释以启用）
  # nginx:
  #   image: nginx:alpine
  #   container_name: temu-nginx
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./nginx/ssl:/etc/nginx/ssl:ro
  #   depends_on:
  #     - temu-app
  #   networks:
  #     - temu-network

networks:
  temu-network:
    driver: bridge
