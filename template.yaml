# yaml-language-server: $schema=https://schema.zeabur.app/template.json
apiVersion: zeabur.com/v1
kind: Template
metadata:
  name: XiaoBaiTu Rebuild V1

spec:
  description: Next.js + FastAPI + Celery + PostgreSQL + Redis deployment for XiaoBaiTu V1.
  icon: https://avatars.githubusercontent.com/u/47072738?v=4
  tags:
    - AI
    - Productivity
    - E-commerce

  variables:
    - key: WEB_DOMAIN
      type: DOMAIN
      name: Web Domain
      description: Public domain for the Next.js frontend.
    - key: API_DOMAIN
      type: DOMAIN
      name: API Domain
      description: Public domain for the FastAPI service.
    - key: NEXTAUTH_SECRET
      type: STRING
      name: NextAuth Secret
      description: Required. Secret used by Auth.js session signing.
    - key: CASDOOR_ISSUER
      type: STRING
      name: Casdoor Issuer
      description: Optional. Casdoor OIDC issuer URL for SSO login.
    - key: CASDOOR_CLIENT_ID
      type: STRING
      name: Casdoor Client ID
      description: Optional. Casdoor OAuth client ID.
    - key: CASDOOR_CLIENT_SECRET
      type: STRING
      name: Casdoor Client Secret
      description: Optional. Casdoor OAuth client secret.
    - key: BOOTSTRAP_LOGIN_EMAIL
      type: STRING
      name: Bootstrap Login Email
      description: Recommended. Built-in bootstrap admin email for first deployment.
    - key: BOOTSTRAP_LOGIN_PASSWORD
      type: STRING
      name: Bootstrap Login Password
      description: Recommended. Built-in bootstrap admin password for first deployment.
    - key: BOOTSTRAP_LOGIN_NAME
      type: STRING
      name: Bootstrap Login Name
      description: Optional. Display name for the bootstrap login account.
    - key: TEAM_ADMIN_EMAILS
      type: STRING
      name: Team Admin Emails
      description: Comma-separated admin emails.
    - key: TEAM_ALLOWED_EMAIL_DOMAINS
      type: STRING
      name: Team Allowed Domains
      description: Comma-separated domains allowed into team mode.
    - key: SYSTEM_ENCRYPTION_KEY
      type: STRING
      name: System Encryption Key
      description: Required. High-entropy key for backend secrets.

  readme: |
    # XiaoBaiTu Rebuild V1

    This template provisions the full new stack:

    - `web` — Next.js 15
    - `api` — FastAPI
    - `worker` — Celery
    - `postgresql` — PostgreSQL
    - `redis` — Redis

    ## What this template auto-configures

    - `DATABASE_URL` from PostgreSQL
    - `REDIS_URL` from Redis
    - `JOB_STORE_BACKEND=database`
    - `ASYNC_JOB_BACKEND=celery`
    - `AUTO_BOOTSTRAP_DB=true` on `api`
    - `NEXT_PUBLIC_API_BASE_URL` from the API domain
    - `NEXTAUTH_URL` from the web domain

    ## What you still need to provide

    - `NEXTAUTH_SECRET`
    - `SYSTEM_ENCRYPTION_KEY`
    - at least one login path:
      - `BOOTSTRAP_LOGIN_EMAIL` + `BOOTSTRAP_LOGIN_PASSWORD`, or
      - `CASDOOR_ISSUER` + `CASDOOR_CLIENT_ID` + `CASDOOR_CLIENT_SECRET`
    - `TEAM_ADMIN_EMAILS`
    - `TEAM_ALLOWED_EMAIL_DOMAINS`

    Recommended first release path:

    1. Set `BOOTSTRAP_LOGIN_EMAIL` to your own admin mailbox
    2. Put the same mailbox into `TEAM_ADMIN_EMAILS`
    3. Set a strong `BOOTSTRAP_LOGIN_PASSWORD`

    On first deployment the `api` service auto-creates the SQLAlchemy tables it needs
    and seeds `system@xiaobaitu.local` when `AUTO_BOOTSTRAP_DB=true`.

    After deployment:

    1. Wait for `postgresql`, `redis`, and `api` to become healthy
    2. Sign in with your bootstrap account or Casdoor SSO
    3. Open `/admin` and confirm `Readiness = ready`
    4. Run `pnpm deploy:db` only when you need to apply Prisma migrations for later schema upgrades

  services:
    - name: postgresql
      icon: https://raw.githubusercontent.com/zeabur/service-icons/main/marketplace/postgresql.svg
      template: PREBUILT
      spec:
        source:
          image: postgres:16-alpine
        ports:
          - id: database
            port: 5432
            type: TCP
        volumes:
          - id: data
            dir: /var/lib/postgresql/data
        env:
          POSTGRES_DB:
            default: xiaobaitu
          POSTGRES_USER:
            default: postgres
            expose: true
            readonly: true
          POSTGRES_PASSWORD:
            default: ${PASSWORD}
            expose: true
          POSTGRES_HOST:
            default: ${CONTAINER_HOSTNAME}
            expose: true
            readonly: true
          POSTGRES_PORT:
            default: ${DATABASE_PORT}
            expose: true
            readonly: true
          POSTGRES_CONNECTION_STRING:
            default: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
            expose: true
            readonly: true

    - name: redis
      icon: https://raw.githubusercontent.com/zeabur/service-icons/main/marketplace/redis.svg
      template: PREBUILT
      spec:
        source:
          image: redis:7-alpine
        ports:
          - id: database
            port: 6379
            type: TCP
        volumes:
          - id: data
            dir: /data
        env:
          REDIS_HOST:
            default: ${CONTAINER_HOSTNAME}
            expose: true
            readonly: true
          REDIS_PORT:
            default: ${DATABASE_PORT}
            expose: true
            readonly: true
          REDIS_CONNECTION_STRING:
            default: redis://${REDIS_HOST}:${REDIS_PORT}/0
            expose: true
            readonly: true

    - name: api
      icon: https://raw.githubusercontent.com/zeabur/service-icons/main/marketplace/fastapi.svg
      template: GIT
      domainKey: API_DOMAIN
      dependencies:
        - postgresql
        - redis
      spec:
        source:
          type: GITHUB
          repoID: 1184397680
          branch: main
          dockerfile: apps/api/Dockerfile
        ports:
          - id: api
            port: 8000
            type: HTTP
        env:
          DATABASE_URL:
            default: ${POSTGRES_CONNECTION_STRING}
          REDIS_URL:
            default: ${REDIS_CONNECTION_STRING}
          JOB_STORE_BACKEND:
            default: database
          ASYNC_JOB_BACKEND:
            default: celery
          AUTO_BOOTSTRAP_DB:
            default: "true"
          API_APP_NAME:
            default: XiaoBaiTu API
          API_APP_VERSION:
            default: 1.0.0
          TEAM_ADMIN_EMAILS:
            default: ${TEAM_ADMIN_EMAILS}
          TEAM_ALLOWED_EMAIL_DOMAINS:
            default: ${TEAM_ALLOWED_EMAIL_DOMAINS}
          SYSTEM_ENCRYPTION_KEY:
            default: ${SYSTEM_ENCRYPTION_KEY}
          CASDOOR_ISSUER:
            default: ${CASDOOR_ISSUER}
          CASDOOR_CLIENT_ID:
            default: ${CASDOOR_CLIENT_ID}
          CASDOOR_CLIENT_SECRET:
            default: ${CASDOOR_CLIENT_SECRET}
          BOOTSTRAP_LOGIN_EMAIL:
            default: ${BOOTSTRAP_LOGIN_EMAIL}

    - name: worker
      icon: https://raw.githubusercontent.com/zeabur/service-icons/main/marketplace/python.svg
      template: GIT
      dependencies:
        - postgresql
        - redis
      spec:
        source:
          type: GITHUB
          repoID: 1184397680
          branch: main
          dockerfile: apps/worker/Dockerfile
        env:
          DATABASE_URL:
            default: ${POSTGRES_CONNECTION_STRING}
          REDIS_URL:
            default: ${REDIS_CONNECTION_STRING}
          JOB_STORE_BACKEND:
            default: database
          ASYNC_JOB_BACKEND:
            default: celery
          AUTO_BOOTSTRAP_DB:
            default: "false"
          TEAM_ADMIN_EMAILS:
            default: ${TEAM_ADMIN_EMAILS}
          TEAM_ALLOWED_EMAIL_DOMAINS:
            default: ${TEAM_ALLOWED_EMAIL_DOMAINS}
          SYSTEM_ENCRYPTION_KEY:
            default: ${SYSTEM_ENCRYPTION_KEY}
          CASDOOR_ISSUER:
            default: ${CASDOOR_ISSUER}
          CASDOOR_CLIENT_ID:
            default: ${CASDOOR_CLIENT_ID}
          CASDOOR_CLIENT_SECRET:
            default: ${CASDOOR_CLIENT_SECRET}

    - name: web
      icon: https://raw.githubusercontent.com/zeabur/service-icons/main/marketplace/nextjs.svg
      template: GIT
      domainKey: WEB_DOMAIN
      dependencies:
        - api
      spec:
        source:
          type: GITHUB
          repoID: 1184397680
          branch: main
          dockerfile: apps/web/Dockerfile
        ports:
          - id: web
            port: 3000
            type: HTTP
        env:
          NEXT_PUBLIC_API_BASE_URL:
            default: https://${API_DOMAIN}
          NEXTAUTH_URL:
            default: https://${WEB_DOMAIN}
          NEXTAUTH_SECRET:
            default: ${NEXTAUTH_SECRET}
          BOOTSTRAP_LOGIN_EMAIL:
            default: ${BOOTSTRAP_LOGIN_EMAIL}
          BOOTSTRAP_LOGIN_PASSWORD:
            default: ${BOOTSTRAP_LOGIN_PASSWORD}
          BOOTSTRAP_LOGIN_NAME:
            default: ${BOOTSTRAP_LOGIN_NAME}
          TEAM_ADMIN_EMAILS:
            default: ${TEAM_ADMIN_EMAILS}
          TEAM_ALLOWED_EMAIL_DOMAINS:
            default: ${TEAM_ALLOWED_EMAIL_DOMAINS}
          CASDOOR_ISSUER:
            default: ${CASDOOR_ISSUER}
          CASDOOR_CLIENT_ID:
            default: ${CASDOOR_CLIENT_ID}
          CASDOOR_CLIENT_SECRET:
            default: ${CASDOOR_CLIENT_SECRET}
