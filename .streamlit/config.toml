[server]
port = 8501
address = "0.0.0.0"
headless = true
enableCORS = false
enableXsrfProtection = true
maxUploadSize = 50
runOnSave = false

[browser]
gatherUsageStats = false
serverAddress = "localhost"

[theme]
primaryColor = "#0f766e"
backgroundColor = "#f4f7fb"
secondaryBackgroundColor = "#ffffff"
textColor = "#0f172a"
font = "sans serif"

[client]
showErrorDetails = false
toolbarMode = "minimal"

[runner]
magicEnabled = false
fastReruns = true
