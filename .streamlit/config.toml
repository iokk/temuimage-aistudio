[server]
port = 8501
address = "0.0.0.0"
headless = true
enableCORS = false
enableXsrfProtection = false
maxUploadSize = 50
runOnSave = false

[browser]
gatherUsageStats = false

[theme]
primaryColor = "#0f766e"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f5f7f7"
textColor = "#1f2937"
font = "sans serif"

[client]
showErrorDetails = false
toolbarMode = "minimal"

[runner]
magicEnabled = false
fastReruns = true

